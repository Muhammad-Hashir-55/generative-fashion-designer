# ═══════════════════════════════════════════════════════════════
#  CI/CD Pipeline — Lint, Test, Deploy to Hugging Face Spaces
# ═══════════════════════════════════════════════════════════════

name: CI/CD Pipeline

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

# ── Job 1: Lint & Test ────────────────────────────────────────
jobs:
  lint-and-test:
    name: 🧪 Lint & Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pyyaml

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test with pytest
      timeout-minutes: 5
      run: pytest tests/ -v

  # ── Job 2: Deploy (only after lint-and-test passes) ─────────
  deploy:
    name: 🚀 Deploy to Hugging Face Spaces
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        lfs: true

    - name: Install Git LFS
      run: |
        sudo apt-get install git-lfs
        git lfs install

    - name: Deploy to Hugging Face (Clean Push)
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        # Configure Git
        git config --global user.email "bot@github.com"
        git config --global user.name "GitHub Action"

        # Create a temporary directory for a clean push
        mkdir ../deploy_temp
        cp -r . ../deploy_temp
        cd ../deploy_temp

        # Package seeded gallery images as text so HF Spaces can serve them
        # without rejecting the raw binaries during push.
        python3 scripts/build_gallery_manifest.py \
          --source outputs/gallery \
          --output app/gallery_seed_manifest.json
        python3 scripts/build_pickup_manifest.py \
          --source outputs/pickup-pictures \
          --output app/pickup_seed_manifest.json

        # --- DEEP CLEAN: Remove all forbidden binaries and junk ---
        rm -rf .git .venv .pytest_cache .vscode __pycache__
        rm -rf data outputs/gallery outputs/pickup-pictures outputs/logs docs
        find . -name "*.pdf" -type f -delete
        # ----------------------------------------------------------

        # Initialize fresh repo
        git init -b main
        git lfs install
        git lfs track "*.pt"
        git add .
        git commit -m "deploy: clean push $(date)"

        # Force push to HF
        git remote add space https://user:${HF_TOKEN}@huggingface.co/spaces/HashirAwaiz/generative-fashion-designer
        git push --force space main
