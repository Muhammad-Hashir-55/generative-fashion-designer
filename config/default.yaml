# ═══════════════════════════════════════════════════════════════════════════════
#  Generative Fashion Designer — Master Configuration
# ═══════════════════════════════════════════════════════════════════════════════

project:
  name: "Generative Fashion Designer"
  version: "1.0.0"
  seed: 42

# ── Data Pipeline ─────────────────────────────────────────────────────────────
data:
  dataset: "DTD"
  data_dir: "./data"
  image_size: 64          # upscale to 64x64 for RGB textures
  channels: 3             # RGB
  num_classes: 47         # DTD has 47 texture categories
  batch_size: 64          # reduced from 128 for 64x64 RGB on 6GB VRAM
  val_split: 0.1          # 10% of training set for validation
  num_workers: 6
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 3
  class_names:
    - "banded"
    - "blotchy"
    - "braided"
    - "bubbly"
    - "bumpy"
    - "chequered"
    - "cobwebbed"
    - "cracked"
    - "crosshatched"
    - "crystalline"
    - "dotted"
    - "fibrous"
    - "flecked"
    - "freckled"
    - "frilly"
    - "gauzy"
    - "grid"
    - "grooved"
    - "honeycombed"
    - "interlaced"
    - "knitted"
    - "lacelike"
    - "lined"
    - "marbled"
    - "matted"
    - "meshed"
    - "paisley"
    - "perforated"
    - "pitted"
    - "pleated"
    - "polka-dotted"
    - "porous"
    - "potholed"
    - "scaly"
    - "smeared"
    - "spiralled"
    - "sprinkled"
    - "stained"
    - "stratified"
    - "striped"
    - "studded"
    - "swirly"
    - "veined"
    - "waffled"
    - "woven"
    - "wrinkled"
    - "zigzagged"

# ── Model Architectures ──────────────────────────────────────────────────────
models:
  latent_dim: 128
  
  vae:
    encoder_channels: [32, 64, 128, 256]
    decoder_channels: [256, 128, 64, 32]
    beta: 1.0                     # β-VAE weight
    beta_anneal_epochs: 10        # KL annealing warmup epochs
    use_residual: true
    use_pretrained_encoder: true
    freeze_pretrained_encoder: true

  dcgan:
    g_channels: [256, 128, 64, 32]
    d_channels: [32, 64, 128, 256]
    g_features: 256
    d_features: 256
    label_smoothing: 0.1
    noise_injection: 0.05

  wgan_gp:
    g_channels: [256, 128, 64, 32]
    critic_channels: [32, 64, 128, 256]
    lambda_gp: 10.0               # gradient penalty coefficient
    n_critic: 5                    # critic steps per generator step

  cgan:
    g_channels: [256, 128, 64, 32]
    d_channels: [32, 64, 128, 256]
    embed_dim: 64                  # class embedding dimension
    projection: true               # use projection discriminator

  style_transfer:
    content_layers: ["21"]         # conv4_2
    style_layers: ["0", "5", "10", "19", "28"]   # conv1_1 → conv5_1
    content_weight: 1.0
    style_weight: 1.0e+5
    tv_weight: 1.0e-6              # total variation regularization
    num_steps: 300
    optimizer: "lbfgs"

  fusion:
    encoder_channels: [32, 64, 128, 256]
    decoder_channels: [256, 128, 64, 32]
    d_channels: [32, 64, 128, 256]
    recon_weight: 10.0
    kl_weight: 1.0
    adv_weight: 1.0

# ── Training ──────────────────────────────────────────────────────────────────
training:
  default_epochs: 50
  epochs:
    vae: 50
    dcgan: 80
    wgan_gp: 80
    cgan: 80
    fusion: 60
    ddpm: 100

  optimizer:
    type: "adam"
    lr: 2.0e-4
    betas: [0.5, 0.999]
    weight_decay: 0.0

  vae_optimizer:
    lr: 1.0e-3
    betas: [0.9, 0.999]

  scheduler:
    type: "cosine_warm_restarts"   # cosine_warm_restarts | step | exponential
    T_0: 10
    T_mult: 2
    eta_min: 1.0e-6

  gradient_clip: 1.0
  mixed_precision: true            # AMP for CUDA
  amp_dtype: "float16"            # float16 | bfloat16
  tf32: true
  deterministic: false
  cudnn_benchmark: true
  checkpoint_every: 10             # save checkpoint every N epochs
  sample_every: 5                  # generate samples every N epochs
  log_every: 100                   # log metrics every N batches

  early_stopping:
    enabled: true
    patience: 15
    min_delta: 1.0e-4

  lightning:
    accelerator: "auto"
    devices: "auto"
    strategy: "auto"
    precision: "16-mixed"
    accumulate_grad_batches: 1
    gradient_clip_val: 1.0
    deterministic: false
    benchmark: true
    log_every_n_steps: 25
    enable_checkpointing: true
    enable_progress_bar: true

  readiness_gate:
    enabled: true
    max_val_recon_loss: 0.20
    max_val_kl_loss: 20.0
    min_preflight_epochs: 1

# ── Evaluation ────────────────────────────────────────────────────────────────
evaluation:
  num_samples: 1000                # samples for FID/IS computation
  fid:
    enabled: true
    feature_dim: 2048
  inception_score:
    enabled: true
    splits: 10
  ssim:
    enabled: true
  reconstruction_metrics: true     # MSE, MAE for VAE

# ── Paths ─────────────────────────────────────────────────────────────────────
paths:
  data_dir: "./data"
  checkpoint_dir: "./outputs/checkpoints"
  log_dir: "./outputs/logs"
  generated_dir: "./outputs/generated"
  evaluation_dir: "./outputs/evaluation"

# ── Visualization ─────────────────────────────────────────────────────────────
visualization:
  grid_size: 8                     # NxN sample grid
  interpolation_steps: 10
  tsne_samples: 2000
  dpi: 150
  figsize: [12, 12]
